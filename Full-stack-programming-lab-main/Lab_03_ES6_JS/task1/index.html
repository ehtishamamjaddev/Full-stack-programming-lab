<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task 1 — Student Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/global.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1>Task 1 — Student Management System</h1>
      <a href="../index.html">← Back to Home</a>
    </header>

    <section class="card form-section">
      <h2 class="form-title">Add New Student</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="studentId">Student ID</label>
          <input type="text" id="studentId" placeholder="e.g. STU-004" />
        </div>
        <div class="form-group">
          <label for="studentName">Full Name</label>
          <input type="text" id="studentName" placeholder="e.g. Kashif Mehmood" />
        </div>
        <div class="form-group">
          <label for="studentSemester">Semester</label>
          <input type="number" id="studentSemester" placeholder="e.g. 6" min="1" max="8" />
        </div>
        <div class="form-group">
          <label for="studentCourses">Courses (comma-separated)</label>
          <input type="text" id="studentCourses" placeholder="e.g. OOP, DSA, DB" />
        </div>
      </div>
      <button class="btn" id="addStudentBtn">Add Student</button>
    </section>

    <div id="students-container" class="students-grid"></div>

    <footer class="page-footer">
      M Ehtisham Amjad | Roll No: 231996 | BSSE-VI-B | Full Stack Programming | Instructor: Sir Shareef Hussain
    </footer>
  </div>
</body>
</html>

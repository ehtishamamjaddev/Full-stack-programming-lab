<!doctype html>
<html lang="en">
  <head>
    <!-- M Ehtisham Amjad BSSE-VI-B (231996) -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 2 — Interactive Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <header class="topbar">
        <a class="backlink" href="../index.html">← Back</a>
        <div class="topbar__title">
          <h1 class="page-title">Task 2 — Interactive Calculator</h1>
          <p class="muted">Addition, subtraction, multiplication, division + validation.</p>
        </div>
        <div class="topbar__meta muted">M Ehtisham Amjad</div>
      </header>

      <section class="card card--pad-lg" aria-labelledby="calcTitle">
        <div class="card__header">
          <h2 id="calcTitle">Basic Calculator</h2>
          <p class="muted">Enter numbers, select an operation, then calculate.</p>
        </div>

        <div class="calc grid">
          <label class="field">
            <span>Number 1</span>
            <input id="num1" type="number" step="any" placeholder="e.g. 12.5" />
          </label>

          <label class="field">
            <span>Operation</span>
            <select id="operation" aria-label="Operation">
              <option value="add">+</option>
              <option value="sub">−</option>
              <option value="mul">×</option>
              <option value="div">÷</option>
            </select>
          </label>

          <label class="field">
            <span>Number 2</span>
            <input id="num2" type="number" step="any" placeholder="e.g. 3" />
          </label>
        </div>

        <div class="row row--between">
          <div class="row">
            <button type="button" id="calcBtn" class="btn btn--primary">
              Calculate
            </button>
            <button type="button" id="resetCalcBtn" class="btn btn--ghost">
              Reset
            </button>
          </div>
          <div class="hint muted">Bonus: result color changes by value.</div>
        </div>

        <div
          id="calcResult"
          class="result result--big"
          aria-live="polite"
          data-tone="neutral"
        ></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>

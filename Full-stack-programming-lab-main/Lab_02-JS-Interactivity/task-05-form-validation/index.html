<!doctype html>
<html lang="en">
  <head>
    <!-- M Ehtisham Amjad BSSE-VI-B (231996) -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 5 — Form Validation</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <header class="topbar">
        <a class="backlink" href="../index.html">← Back</a>
        <div class="topbar__title">
          <h1 class="page-title">Task 5 — Form Validation</h1>
          <p class="muted">Registration form with inline error messages.</p>
        </div>
        <div class="topbar__meta muted">M Ehtisham Amjad</div>
      </header>

      <section class="card card--pad-lg" aria-labelledby="formTitle">
        <div class="card__header">
          <h2 id="formTitle">Register</h2>
          <p class="muted">All fields are required. Validation runs on submit.</p>
        </div>

        <form id="regForm" class="form" novalidate>
          <div class="form__grid">
            <div class="form__field">
              <label for="name">Name</label>
              <input id="name" name="name" type="text" placeholder="Your full name" />
              <div id="nameError" class="field-error" aria-live="polite"></div>
            </div>

            <div class="form__field">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" placeholder="name@example.com" />
              <div id="emailError" class="field-error" aria-live="polite"></div>
            </div>

            <div class="form__field">
              <label for="age">Age</label>
              <input id="age" name="age" type="number" min="0" placeholder="18–60" />
              <div id="ageError" class="field-error" aria-live="polite"></div>
            </div>

            <div class="form__field">
              <label for="password">Password</label>
              <input
                id="password"
                name="password"
                type="password"
                placeholder="Minimum 6 characters"
              />
              <div id="passwordError" class="field-error" aria-live="polite"></div>
            </div>
          </div>

          <div class="row">
            <button type="submit" class="btn btn--primary">Create account</button>
            <button type="button" id="resetFormBtn" class="btn btn--ghost">Reset</button>
          </div>

          <div id="formMessage" class="alert is-hidden" aria-live="polite"></div>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 8 – Quiz Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Top Bar -->
    <nav class="top-bar">
        <a href="../index.html" class="back-link">&larr; Dashboard</a>
        <span class="credit-tag">M Ehtisham Amjad | BSSE-VI-B</span>
    </nav>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>Quiz Game</h1>
            <p class="subtitle">Test your knowledge – one question at a time</p>
        </header>

        <!-- Quiz Card -->
        <div class="quiz-card" id="quizCard">

            <!-- Progress Bar -->
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <!-- Question Info -->
            <div class="question-info">
                <span id="questionNumber">Question 1 of 10</span>
                <span id="scoreDisplay">Score: 0</span>
            </div>

            <!-- Question -->
            <h2 id="questionText" class="question-text"></h2>

            <!-- Options -->
            <div id="optionsContainer" class="options-container"></div>

            <!-- Feedback -->
            <p id="feedback" class="feedback" style="display: none;"></p>

            <!-- Next Button -->
            <button id="nextBtn" class="next-btn" style="display: none;">Next Question</button>
        </div>

        <!-- Result Card -->
        <div class="result-card" id="resultCard" style="display: none;">
            <div class="result-icon" id="resultIcon"></div>
            <h2 id="resultTitle" class="result-title"></h2>
            <p id="resultText" class="result-text"></p>
            <div class="result-score" id="resultScore"></div>
            <button id="restartBtn" class="restart-btn">Play Again</button>
        </div>
    </div>

    <!-- Credits Footer -->
    <footer class="page-footer">
        <p>&copy; 2026 <strong>M Ehtisham Amjad</strong> | Full Stack Programming | BSSE-VI-B (231996) | Air University</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>

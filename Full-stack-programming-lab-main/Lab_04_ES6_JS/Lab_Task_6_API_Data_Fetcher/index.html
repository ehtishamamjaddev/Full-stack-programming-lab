<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 6 – API Data Fetcher</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Top Bar -->
    <nav class="top-bar">
        <a href="../index.html" class="back-link">&larr; Dashboard</a>
        <span class="credit-tag">M Ehtisham Amjad | BSSE-VI-B</span>
    </nav>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>API Data Fetcher</h1>
            <p class="subtitle">Fetching posts from JSONPlaceholder using jQuery AJAX</p>
        </header>

        <!-- Posts Container -->
        <div id="postsContainer" class="posts-grid"></div>

        <!-- Loading Indicator -->
        <div id="loader" class="loader" style="display: none;">
            <div class="spinner"></div>
            <p>Loading posts...</p>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message" style="display: none;">
            <p id="errorText">Something went wrong. Please try again.</p>
            <button id="retryBtn" class="retry-btn">Retry</button>
        </div>

        <!-- Load More -->
        <div class="load-more-wrapper">
            <button id="loadMoreBtn" class="load-more-btn" style="display: none;">Load More</button>
        </div>

        <!-- Post Count -->
        <p id="postCount" class="post-count"></p>
    </div>

    <!-- Credits Footer -->
    <footer class="page-footer">
        <p>&copy; 2026 <strong>M Ehtisham Amjad</strong> | Full Stack Programming | BSSE-VI-B (231996) | Air University</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>

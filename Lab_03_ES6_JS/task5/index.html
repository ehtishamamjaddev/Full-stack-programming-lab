<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task 5 — Product Catalog (Map)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/global.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1>Task 5 — Product Catalog (Map)</h1>
      <a href="../index.html">← Back to Home</a>
    </header>

    <div class="card search-section">
      <h2 class="sec-label">Search Product by ID</h2>
      <div class="input-row">
        <input type="text" id="searchInput" placeholder="e.g. P001" />
        <button class="btn" id="searchBtn">Search</button>
      </div>
      <div id="search-result"></div>
    </div>

    <div class="count-row">
      <span>Total Products</span>
      <span class="badge badge-accent" id="productCount">0</span>
    </div>

    <div id="product-grid" class="prod-grid"></div>

    <div class="card add-section">
      <button class="collapse-btn" id="toggleAddForm">+ Add New Product</button>
      <div id="addFormBody" class="form-body hidden">
        <div class="form-grid">
          <div class="form-group">
            <label for="newId">Product ID</label>
            <input type="text" id="newId" placeholder="e.g. P006" />
          </div>
          <div class="form-group">
            <label for="newName">Name</label>
            <input type="text" id="newName" placeholder="Product name" />
          </div>
          <div class="form-group">
            <label for="newCategory">Category</label>
            <input type="text" id="newCategory" placeholder="e.g. Electronics" />
          </div>
          <div class="form-group">
            <label for="newPrice">Price ($)</label>
            <input type="number" id="newPrice" placeholder="29.99" min="0" step="0.01" />
          </div>
          <div class="form-group">
            <label for="newStock">Stock</label>
            <input type="number" id="newStock" placeholder="50" min="0" />
          </div>
        </div>
        <button class="btn" id="addProductBtn">Add Product</button>
      </div>
    </div>

    <footer class="page-footer">
      M Ehtisham Amjad | Roll No: 231996 | BSSE-VI-B | Full Stack Programming | Instructor: Sir Shareef Hussain
    </footer>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task 6 — Mini University Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/global.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1>Task 6 — Mini University Portal</h1>
      <a href="../index.html">← Back to Home</a>
    </header>

    <section class="card sec-card">
      <h2>1 · Add Student</h2>
      <div class="row-flex">
        <input type="text" id="newStudentId" placeholder="Student ID (e.g. S001)" />
        <input type="text" id="newStudentName" placeholder="Student Name" />
        <button class="btn" id="addStudentBtn">Add Student</button>
      </div>
    </section>

    <section class="card sec-card">
      <h2>2 · Enroll in Course</h2>
      <div class="row-flex">
        <select id="studentSelect">
          <option value="">— Select Student —</option>
        </select>
        <input type="text" id="courseNameInput" placeholder="Course name" />
        <button class="btn" id="enrollBtn">Enroll</button>
      </div>
    </section>

    <div id="toast-area"></div>

    <h2 class="section-title">3 · All Students</h2>
    <div id="portal-container" class="portal-grid"></div>

    <section class="card sec-card save-sec">
      <h2>4 · Save Portal Data</h2>
      <button class="btn btn-success" id="saveBtn">Save Data</button>
      <div id="save-status"></div>
    </section>

    <footer class="page-footer">
      M Ehtisham Amjad | Roll No: 231996 | BSSE-VI-B | Full Stack Programming | Instructor: Sir Shareef Hussain
    </footer>
  </div>
</body>
</html>
